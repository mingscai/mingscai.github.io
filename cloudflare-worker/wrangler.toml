name = "visitor-map"
main = "src/index.js"
compatibility_date = "2024-09-23"
preview_urls = false

# Origins allowed to call the Worker (CORS).
[vars]
ALLOW_ORIGINS = "https://mingscai.github.io,http://127.0.0.1:4000,http://localhost:4000"
# Max counted visits per IP per UTC day (backstop against spamming /collect).
RATE_LIMIT_PER_DAY = "100"

# D1 database binding. Create it with `wrangler d1 create visitor-map-db` and
# paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "visitor-map-db"
database_id = "746fe63a-96d3-498b-93aa-8db3d0e06c64"
